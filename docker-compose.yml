# CampusVision AI — 完整部署
# 启动: docker compose up -d
# 构建并启动: docker compose up -d --build
# 停止: docker compose down
# 仅启动依赖服务: docker compose up -d kafka redis mariadb

networks:
  campusvision:
    driver: bridge

volumes:
  redis-data:
  mariadb-data:
  minio-data:
  face-models:
  zookeeper-data:
  zookeeper-log:

services:
  # ==================== Zookeeper (Kafka dependency) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    container_name: cv-zookeeper
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    user: root
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      campusvision.ai/service: "zookeeper"

  # ==================== Kafka ====================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: cv-kafka
    networks: [campusvision]
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    user: root
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    labels:
      campusvision.ai/service: "kafka"

  # ==================== Kafka topic initialization ====================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cv-kafka-init
    networks: [campusvision]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [
        "/bin/bash",
        "-c",
        "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_frame --partitions 4 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=43200000 --config max.message.bytes=5242880 --config compression.type=producer;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_event --partitions 2 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=604800000 --config max.message.bytes=1048576 --config compression.type=producer;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_alert --partitions 1 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=604800000;
        echo 'Topics created:'; kafka-topics --bootstrap-server kafka:9092 --list;",
      ]
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      campusvision.ai/service: "kafka-init"

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: cv-redis
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      campusvision.ai/service: "redis"

  # ==================== MariaDB ====================
  mariadb:
    image: mariadb:10.11
    hostname: mariadb
    container_name: cv-mariadb
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_dev
      MARIADB_DATABASE: sims
      MARIADB_USER: sims
      MARIADB_PASSWORD: sims
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./infra/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "sims", "-psims"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      campusvision.ai/service: "mariadb"

  # ==================== MinIO (face snapshots — currently unused) ====================
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: cv-minio
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      campusvision.ai/service: "minio"

  # ==================== Stream Gateway (Go) ====================
  stream-gateway:
    build:
      context: ./stream-gateway
    image: campusvision/stream-gateway:latest
    container_name: cv-stream-gateway
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./stream-gateway/config.docker.yaml:/app/config.yaml
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      campusvision.ai/service: "stream-gateway"

  # ==================== Face Recognition (Python) ====================
  face-recognition:
    build:
      context: ./face-recognition
    image: campusvision/face-recognition:latest
    container_name: cv-face-recognition
    networks: [campusvision]
    restart: unless-stopped
    volumes:
      - face-models:/app/app/models
      - ./face-recognition/config.docker.yaml:/app/config.yaml
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      stream-gateway:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      campusvision.ai/service: "face-recognition"

  # ==================== Dormitory Service (Go) ====================
  dormitory-service-go:
    build:
      context: ./dormitory-service-go
    image: campusvision/dormitory-service-go:latest
    container_name: cv-dormitory-service-go
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000,http://localhost:8083"
    volumes:
      - ./dormitory-service-go/config.docker.yaml:/app/config.yaml
    depends_on:
      kafka:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      campusvision.ai/service: "dormitory-service-go"

  # ==================== Frontend (Vue 3 + Nginx) ====================
  frontend:
    build:
      context: ./frontend
    image: campusvision/frontend:latest
    container_name: cv-frontend
    networks: [campusvision]
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - dormitory-service-go
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    labels:
      campusvision.ai/service: "frontend"

