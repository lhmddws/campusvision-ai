name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build-test:
    name: Go ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - path: stream-gateway
            module-path: github.com/sims/campusvision/stream-gateway
          - path: dormitory-service-go
            module-path: github.com/sims/campusvision/dormitory-service-go

    defaults:
      run:
        working-directory: ${{ matrix.module.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: ${{ matrix.module.path }}/go.sum

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: face-recognition

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: face-recognition/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
