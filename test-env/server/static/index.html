<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CampusVision AI · 校园监控测试系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-deep: #07070d;
    --bg-panel: #0d0d1a;
    --bg-card: #111122;
    --bg-card-hover: #161630;
    --border: #1a1a3a;
    --border-bright: #2a2a5a;
    --text: #c8c8d4;
    --text-dim: #666688;
    --text-bright: #e8e8f0;
    --green: #00ff88;
    --green-dim: #00cc66;
    --green-bg: rgba(0,255,136,0.08);
    --red: #ff3355;
    --red-dim: #cc2244;
    --red-bg: rgba(255,51,85,0.08);
    --amber: #ffaa33;
    --amber-dim: #dd8822;
    --amber-bg: rgba(255,170,51,0.08);
    --gray: #555577;
    --gray-dim: #444466;
    --scanline: rgba(0,255,136,0.03);
    --glow-green: 0 0 12px rgba(0,255,136,0.15);
    --glow-red: 0 0 12px rgba(255,51,85,0.15);
    --font: 'Share Tech Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    border: 2px solid var(--green);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 14px;
    font-weight: bold;
    box-shadow: var(--glow-green);
  }
  .logo-text {
    font-size: 16px;
    font-weight: 400;
    color: var(--text-bright);
    letter-spacing: 1px;
  }
  .logo-text span { color: var(--green); }
  .header-badge {
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 2px 10px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .header-right .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .header-right .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .header-right .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-label { vertical-align: middle; }
  .uptime { vertical-align: middle; }

  /* Settings gear button */
  .settings-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 16px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: var(--font);
  }
  .settings-btn:hover {
    color: var(--green);
    border-color: rgba(0,255,136,0.3);
    box-shadow: 0 0 10px rgba(0,255,136,0.1);
  }
  .settings-btn:active { transform: scale(0.94); }

  /* ── Main Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Camera Grid ── */
  .grid-wrap {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    min-width: 0;
  }

  /* ── Camera Card ── */
  .cam-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 0;
  }
  .cam-card:hover {
    border-color: var(--border-bright);
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
  }
  .cam-card.flash {
    border-color: var(--green);
    box-shadow: 0 0 24px rgba(0,255,136,0.2);
  }
  .cam-card.flash-exit {
    border-color: var(--red);
    box-shadow: 0 0 24px rgba(255,51,85,0.2);
  }
  .cam-card.flash-idle {
    border-color: var(--amber);
    box-shadow: 0 0 24px rgba(255,170,51,0.15);
  }

  /* Feed area */
  .cam-feed {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    min-height: 0;
  }
  .cam-feed img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s;
  }
  .cam-feed img.loading { opacity: 0.5; }

  /* Scanning line overlay */
  .cam-feed::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.4;
    animation: scan 2.8s ease-in-out infinite;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes scan {
    0%   { top: 0; opacity: 0.15; }
    10%  { opacity: 0.5; }
    50%  { top: 100%; opacity: 0.15; }
    60%  { opacity: 0.35; }
    100% { top: 0; opacity: 0.15; }
  }

  /* Camera name badge */
  .cam-badge {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    padding: 3px 10px 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(0,255,136,0.25);
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .cam-badge .dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 1.5s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .cam-badge .cam-id {
    color: var(--green-dim);
    font-weight: 400;
  }
  .cam-badge .cam-name {
    color: var(--text-bright);
  }

  /* Recording indicator */
  .rec-indicator {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.7);
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.5px;
  }
  .rec-indicator .rec-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse-dot 1s infinite;
  }

  /* Timestamp overlay (bottom-right) */
  .cam-timestamp {
    position: absolute;
    bottom: 8px; right: 8px;
    z-index: 3;
    font-size: 10px;
    color: rgba(0,255,136,0.5);
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.5px;
  }

  /* Controls area */
  .cam-controls {
    display: flex;
    gap: 5px;
    padding: 8px 10px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cam-controls button {
    flex: 1;
    padding: 7px 0;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .cam-controls button:hover { background: rgba(255,255,255,0.04); }
  .cam-controls button:active { transform: scale(0.96); }
  .cam-controls button.btn-entry {
    color: var(--green);
    border-color: rgba(0,255,136,0.25);
  }
  .cam-controls button.btn-entry:hover {
    background: rgba(0,255,136,0.1);
    border-color: rgba(0,255,136,0.5);
    box-shadow: 0 0 12px rgba(0,255,136,0.08);
  }
  .cam-controls button.btn-exit {
    color: var(--red);
    border-color: rgba(255,51,85,0.25);
  }
  .cam-controls button.btn-exit:hover {
    background: rgba(255,51,85,0.1);
    border-color: rgba(255,51,85,0.5);
    box-shadow: 0 0 12px rgba(255,51,85,0.08);
  }
  .cam-controls button.btn-idle {
    color: var(--gray);
    border-color: rgba(85,85,119,0.25);
  }
  .cam-controls button.btn-idle:hover {
    background: rgba(85,85,119,0.1);
    border-color: rgba(85,85,119,0.5);
  }

  /* Webcam toggle button in controls */
  .cam-controls button.btn-webcam {
    flex: 0 0 auto;
    min-width: 36px;
    padding: 7px 4px;
    font-size: 13px;
    color: var(--gray);
    border-color: rgba(85,85,119,0.25);
  }
  .cam-controls button.btn-webcam:hover {
    background: rgba(0,255,136,0.06);
    border-color: rgba(0,255,136,0.3);
  }
  .cam-controls button.btn-webcam.active {
    color: var(--green);
    border-color: rgba(0,255,136,0.5);
    background: rgba(0,255,136,0.08);
    box-shadow: 0 0 8px rgba(0,255,136,0.1);
  }

  /* ── Event Log Panel ── */
  .event-panel {
    width: 320px;
    min-width: 280px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .event-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .event-panel-header h3 {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text-bright);
  }
  .event-panel-header h3 span { color: var(--green-dim); }
  .event-count-badge {
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg-card);
    padding: 2px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .event-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .event-list::-webkit-scrollbar { width: 4px; }
  .event-list::-webkit-scrollbar-track { background: transparent; }
  .event-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .event-list::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 14px;
    font-size: 11px;
    line-height: 1.5;
    transition: background 0.2s;
    border-left: 2px solid transparent;
  }
  .event-item:hover { background: rgba(255,255,255,0.02); }
  .event-item.new-item {
    animation: slideIn 0.25s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .event-item .ev-time {
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    font-size: 10px;
    min-width: 64px;
  }
  .event-item .ev-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    min-width: 28px;
    text-align: center;
    letter-spacing: 0.5px;
    font-family: var(--font);
  }
  .event-item .ev-badge.entry {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.2);
  }
  .event-item .ev-badge.exit {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(255,51,85,0.2);
  }
  .event-item .ev-badge.idle {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid rgba(255,170,51,0.2);
  }
  .event-item .ev-detail {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .event-item .ev-cam {
    color: var(--text-dim);
    flex-shrink: 0;
    font-size: 10px;
  }
  .event-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .event-empty span {
    opacity: 0.5;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
  }
  .status-bar .status-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .status-bar .status-left .sb-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-dim);
  }
  .status-bar .status-left .sb-item .sb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .status-bar .status-left .sb-item .sb-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-bar .status-left .sb-item .sb-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-bar .status-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Toggle Switch */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-wrap .toggle-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .toggle-track {
    width: 36px; height: 20px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    position: relative;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .toggle-track.active {
    background: rgba(0,255,136,0.15);
    border-color: rgba(0,255,136,0.4);
  }
  .toggle-track .toggle-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gray-dim);
    position: absolute;
    top: 2px; left: 2px;
    transition: all 0.25s;
  }
  .toggle-track.active .toggle-thumb {
    left: 18px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .gen-btn {
    padding: 4px 14px;
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    background: transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .gen-btn:hover {
    background: rgba(0,255,136,0.06);
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }
  .gen-btn:active { transform: scale(0.96); }

  .events-counter {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .events-counter span { color: var(--green); font-size: 13px; }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    top: 60px; right: 20px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  .toast {
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--font);
    border: 1px solid;
    backdrop-filter: blur(8px);
    animation: toastIn 0.3s ease-out;
    pointer-events: auto;
    max-width: 320px;
  }
  .toast.toast-out {
    animation: toastOut 0.3s ease-in forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(30px); }
  }
  .toast.success {
    background: rgba(0,255,136,0.12);
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }
  .toast.error {
    background: rgba(255,51,85,0.12);
    border-color: rgba(255,51,85,0.3);
    color: var(--red);
  }

  /* ── Settings Drawer ── */
  .drawer-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .drawer-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .drawer {
    position: fixed;
    top: 0; right: -400px;
    width: 380px;
    max-width: 100vw;
    height: 100vh;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 30px rgba(0,0,0,0.5);
  }
  .drawer.open {
    right: 0;
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-header h3 {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-bright);
    letter-spacing: 1px;
  }
  .drawer-close {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: var(--font);
  }
  .drawer-close:hover {
    color: var(--red);
    border-color: rgba(255,51,85,0.3);
  }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  .drawer-body::-webkit-scrollbar { width: 4px; }
  .drawer-body::-webkit-scrollbar-track { background: transparent; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .drawer-footer {
    display: flex;
    gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-footer button {
    flex: 1;
    padding: 10px 0;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .drawer-footer button:hover {
    background: rgba(0,255,136,0.06);
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }
  .drawer-footer button:active { transform: scale(0.97); }
  .drawer-footer button.btn-danger:hover {
    background: rgba(255,51,85,0.08);
    border-color: rgba(255,51,85,0.3);
    color: var(--red);
  }

  /* ── Config Sections ── */
  .cfg-section {
    border-bottom: 1px solid var(--border);
  }
  .cfg-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    font-size: 12px;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }
  .cfg-section-header:hover {
    background: rgba(255,255,255,0.02);
  }
  .cfg-section-header .chevron {
    font-size: 9px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .cfg-section-header.collapsed .chevron {
    transform: rotate(-90deg);
  }
  .cfg-section-body {
    padding: 6px 18px 14px;
    display: block;
  }
  .cfg-section-body.hidden {
    display: none;
  }

  .cfg-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    gap: 12px;
  }
  .cfg-row .cfg-label {
    font-size: 11px;
    color: var(--text);
    flex-shrink: 0;
    min-width: 120px;
  }
  .cfg-row .cfg-label .cfg-unit {
    color: var(--text-dim);
    font-size: 10px;
  }
  .cfg-row .cfg-value {
    font-size: 11px;
    color: var(--green);

  /* Config toggle (mini version) */

  .cfg-toggle-row .cfg-toggle-track.active {
    background: rgba(0,255,136,0.15);

  .cfg-toggle-row .cfg-toggle-track .cfg-toggle-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gray-dim);
    position: absolute;
    top: 2px; left: 2px;
    transition: all 0.25s;
  }
  .cfg-toggle-row .cfg-toggle-track.active .cfg-toggle-thumb {
    left: 16px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* ── People Management ── */
  .people-input-row {
    display: flex;
    gap: 6px;
    padding: 0 18px 10px;
  }
  .people-input-row input {
    flex: 1;
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    outline: none;
  }
  .people-input-row input:focus {
    border-color: rgba(0,255,136,0.3);
  }
  .people-input-row input::placeholder {
    color: var(--text-dim);
    font-size: 10px;
  }
  .people-input-row button {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--green);
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .people-input-row button:hover {
    background: rgba(0,255,136,0.1);
    border-color: rgba(0,255,136,0.3);
  }
  .people-input-row button:active { transform: scale(0.96); }

  .people-list {
    padding: 0 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
  }
  .people-list::-webkit-scrollbar { width: 4px; }
  .people-list::-webkit-scrollbar-track { background: transparent; }
  .people-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .people-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
  }
  .people-item .people-name {
    color: var(--text);
  }
  .people-item .people-remove {
    background: transparent;
    border: none;
    color: var(--text-dim);

    transition: all 0.2s;
    font-family: var(--font);

  }

  .people-empty {
    padding: 12px 18px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  .cfg-loading {
    padding: 20px;
    text-align: center;
    color: var(--text-dim);

  }
  .cfg-loading .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Responsive fallback ── */
  @media (max-width: 1100px) {
    .event-panel { width: 240px; min-width: 200px; }
  }
  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .event-panel { width: 100%; min-width: 0; border-left: none; border-top: 1px solid var(--border); max-height: 200px; }
    .grid-wrap { gap: 6px; padding: 6px; }
  }
  @media (max-width: 600px) {
    .grid-wrap { grid-template-columns: 1fr; grid-template-rows: auto; }
    .drawer { width: 100vw; }

</style>

<body>

<div class="app">
  <!-- Header -->
  <header class="header">

  <!-- Status Bar -->
  <div class="status-bar">

<!-- Settings Drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="settings-drawer">

    <h3>&#9881; 系统设置</h3>

  </div>
  <div class="drawer-body" id="drawer-body">

      <span class="spinner"></span>加载配置中...

  <div class="drawer-footer">
    <button type="button" id="save-config">&#128190; 保存配置</button>
    <button type="button" id="reset-config" class="btn-danger">&#8634; 恢复默认</button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
(function() {
  'use strict';

  /* ── Config ── */
  const API_BASE = window.location.origin;

  const CAMERAS = {
    'cam-a': { building: 'A', label: 'A栋入口' },
    'cam-b': { building: 'B', label: 'B栋入口' },
    'cam-c': { building: 'C', label: 'C栋入口' },
    'cam-d': { building: 'D', label: 'D栋入口' },
  };

  let PEOPLE = [
    '张三 (2024001)',
    '李四 (2024002)',
    '王五 (2024003)',
    '赵六 (2024004)',
    '孙七 (2024005)',
  ];

  const ACTION_LABELS = { entry: '进入', exit: '离开', idle: '无人' };
  const ACTION_CLASSES = { entry: 'btn-entry', exit: 'btn-exit', idle: 'btn-idle' };
  const ACTION_BADGE_CLASS = { entry: 'entry', exit: 'exit', idle: 'idle' };

  /* ── State ── */
  let eventsGenerated = 0;
  let randomMode = false;
  let randomTimer = null;
  const feedTimers = {};
  let webcamStatus = {};
  let currentConfig = null;

  /* ── Config sections metadata ── */
  const CONFIG_SECTIONS = [
    {
      id: 'sec-frame',
      title: '&#128247; 帧设置',
      fields: [
        { key: 'jpeg_quality', label: 'JPEG质量', type: 'slider', min: 10, max: 100, step: 1, unit: '' },
        { key: 'frame_width', label: '帧宽度', type: 'select', options: [320, 640, 854, 1280], unit: 'px' },
        { key: 'frame_height', label: '帧高度', type: 'display', unit: 'px' },
        { key: 'fps', label: 'FPS', type: 'slider', min: 1, max: 30, step: 1, unit: '' },
      ]
    },
    {
      id: 'sec-detection',
      title: '&#127919; 检测设置',
      fields: [
        { key: 'confidence_threshold', label: '置信度阈值', type: 'slider', min: 0.1, max: 0.99, step: 0.05, unit: '' },
        { key: 'min_face_size', label: '最小人脸', type: 'slider', min: 40, max: 300, step: 1, unit: 'px' },
      ]
    },
    {
      id: 'sec-match',
      title: '&#128279; 匹配设置',
      fields: [
        { key: 'match_threshold', label: '匹配阈值', type: 'slider', min: 0.1, max: 0.99, step: 0.05, unit: '' },
        { key: 'cache_ttl', label: '缓存TTL', type: 'number', min: 1, max: 86400, unit: '秒' },
      ]
    },
    {
      id: 'sec-direction',
      title: '&#127985; 方向设置',
      fields: [
        { key: 'roi_line_x', label: 'ROI线位置', type: 'slider', min: 0.1, max: 0.9, step: 0.05, unit: '' },
        { key: 'min_track_points', label: '最小轨迹点', type: 'slider', min: 1, max: 10, step: 1, unit: '' },
      ]
    },
    {
      id: 'sec-dedup',
      title: '&#128200; 去重设置',
      fields: [
        { key: 'dedup_window_seconds', label: '去重窗口', type: 'slider', min: 1, max: 60, step: 1, unit: '秒' },
      ]
    },
    {
      id: 'sec-stranger',
      title: '&#128100; 陌生人告警',
      fields: [
        { key: 'stranger_alert_enabled', label: '陌生人告警', type: 'toggle' },
        { key: 'stranger_alert_threshold', label: '告警阈值', type: 'slider', min: 0.1, max: 0.9, step: 0.05, unit: '' },
      ]
    },
    {
      id: 'sec-night',
      title: '&#127769; 夜间模式',
      fields: [
        { key: 'night_mode_enabled', label: '夜间模式', type: 'toggle' },
        { key: 'night_mode_start_hour', label: '开始小时', type: 'slider', min: 0, max: 23, step: 1, unit: '时' },
        { key: 'night_mode_end_hour', label: '结束小时', type: 'slider', min: 0, max: 23, step: 1, unit: '时' },
      ]
    },
    {
      id: 'sec-motion',
      title: '&#127939; 运动检测',
      fields: [
        { key: 'motion_threshold', label: '运动阈值', type: 'slider', min: 0.01, max: 0.5, step: 0.01, unit: '' },
        { key: 'dynamic_extraction', label: '动态抽帧', type: 'toggle' },
      ]
    },
    {
      id: 'sec-source',
      title: '&#127916; 摄像头源',
      fields: [
        { key: 'camera_source', label: '摄像头源', type: 'select', options: ['simulated', 'webcam'], optionLabels: ['模拟', 'Webcam'] },
        { key: 'webcam_device', label: 'Webcam设备', type: 'number', min: 0, max: 10, unit: '索引' },
      ]
    },
  ];

  /* ── DOM refs ── */
  const grid = document.getElementById('camera-grid');
  const eventList = document.getElementById('event-list');
  const eventCount = document.getElementById('event-count');
  const genCountValue = document.getElementById('gen-count-value');
  const randomToggle = document.getElementById('random-toggle');
  const randomTrack = document.getElementById('random-track');
  const randomLabel = document.getElementById('random-label');
  const genTrafficBtn = document.getElementById('gen-traffic-btn');
  const sbKafkaDot = document.getElementById('sb-kafka-dot');
  const sbKafkaText = document.getElementById('sb-kafka-text');
  const sbUptime = document.getElementById('sb-uptime');
  const hdrKafkaDot = document.getElementById('hdr-kafka-dot');
  const hdrKafkaText = document.getElementById('hdr-kafka-text');
  const hdrUptime = document.getElementById('hdr-uptime');
  const toastContainer = document.getElementById('toast-container');
  const settingsToggle = document.getElementById('settings-toggle');
  const drawerOverlay = document.getElementById('drawer-overlay');
  const settingsDrawer = document.getElementById('settings-drawer');
  const drawerClose = document.getElementById('drawer-close');
  const cfgLoading = document.getElementById('cfg-loading');
  const cfgContent = document.getElementById('cfg-content');
  const saveConfigBtn = document.getElementById('save-config');
  const resetConfigBtn = document.getElementById('reset-config');

  /* ── Helper: compute 16:9 height ── */
  function computeHeight(width) {
    return Math.round(width * 9 / 16);
  }

  /* ── Build camera cards ── */
  function buildGrid() {
    grid.innerHTML = '';
    Object.entries(CAMERAS).forEach(([id, cfg]) => {
      const card = document.createElement('div');
      card.className = 'cam-card';
      card.id = 'card-' + id;

      const feed = document.createElement('div');
      feed.className = 'cam-feed';

      const img = document.createElement('img');
      img.id = 'img-' + id;
      img.src = API_BASE + '/api/cameras/' + id + '/frame.jpg?t=' + Date.now();
      img.alt = cfg.label;
      img.addEventListener('load', function() { this.classList.remove('loading'); });
      img.addEventListener('error', function() {
        this.src = 'data:image/svg+xml,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">' +
          '<rect fill="#07070d" width="400" height="300"/>' +
          '<text fill="#333366" font-family="monospace" font-size="14" text-anchor="middle" x="200" y="145">NO SIGNAL</text>' +
          '<text fill="#222244" font-family="monospace" font-size="11" text-anchor="middle" x="200" y="165">' + cfg.label + '</text>' +
          '</svg>'
        );
      });

      // Badge
      const badge = document.createElement('div');
      badge.className = 'cam-badge';
      badge.innerHTML = '<span class="dot-live"></span><span class="cam-id">' + id + '</span><span class="cam-name">' + cfg.label + '</span>';

      // Rec
      const rec = document.createElement('div');
      rec.className = 'rec-indicator';
      rec.innerHTML = '<span class="rec-dot"></span>REC';

      // Timestamp
      const ts = document.createElement('div');
      ts.className = 'cam-timestamp';
      ts.id = 'ts-' + id;

      feed.appendChild(img);
      feed.appendChild(badge);
      feed.appendChild(rec);
      feed.appendChild(ts);
      card.appendChild(feed);

      // Controls
      const controls = document.createElement('div');
      controls.className = 'cam-controls';
      ['entry', 'exit', 'idle'].forEach(action => {
        const btn = document.createElement('button');
        btn.className = ACTION_CLASSES[action];
        btn.textContent = ACTION_LABELS[action];
        btn.dataset.camera = id;
        btn.dataset.action = action;
        btn.addEventListener('click', function() {
          simulateEvent(id, action);
        });
        controls.appendChild(btn);
      });

      // Webcam toggle button
      const wBtn = document.createElement('button');
      wBtn.className = 'btn-webcam';
      wBtn.id = 'wc-' + id;
      wBtn.textContent = '\u{1F4F7}';
      wBtn.title = 'Webcam';
      wBtn.dataset.camera = id;
      wBtn.addEventListener('click', function() {
        toggleWebcam(id);
      });
      controls.appendChild(wBtn);

      card.appendChild(controls);
      grid.appendChild(card);
    });
  }

  /* ── Update webcam button states ── */
  function updateWebcamButtons() {
    Object.keys(CAMERAS).forEach(id => {
      const btn = document.getElementById('wc-' + id);
      if (btn) {
        const active = webcamStatus[id] === true;
        btn.classList.toggle('active', active);
        btn.title = active ? '停止Webcam' : '启动Webcam';
      }
    });
  }

  /* ── Timestamp update ── */
  function updateTimestamps() {
    const now = new Date();
    const ts = now.toTimeString().slice(0, 8);
    Object.keys(CAMERAS).forEach(id => {
      const el = document.getElementById('ts-' + id);
      if (el) el.textContent = ts;
    });
  }

  /* ── Refresh camera feeds ── */
  function refreshFeeds() {
    const t = Date.now();
    Object.keys(CAMERAS).forEach(id => {
      const img = document.getElementById('img-' + id);
      if (img) {
        img.classList.add('loading');
        img.src = API_BASE + '/api/cameras/' + id + '/frame.jpg?t=' + t;
      }
    });
    updateTimestamps();
  }

  /* ── Simulate event ── */
  async function simulateEvent(cameraId, action, person) {
    const body = { action: action };
    if (person) {
      body.person = person;
    } else if (action === 'entry' || action === 'exit') {
      body.person = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
    }

    try {
      const res = await fetch(API_BASE + '/api/cameras/' + cameraId + '/simulate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const badgeEl = document.getElementById('card-' + cameraId);
      if (badgeEl) {
        badgeEl.classList.remove('flash', 'flash-exit', 'flash-idle');
        void badgeEl.offsetWidth;
        if (action === 'entry') badgeEl.classList.add('flash');
        else if (action === 'exit') badgeEl.classList.add('flash-exit');
        else badgeEl.classList.add('flash-idle');
        setTimeout(() => {
          badgeEl.classList.remove('flash', 'flash-exit', 'flash-idle');
        }, 600);
      }

      eventsGenerated++;
      genCountValue.textContent = eventsGenerated;

      refreshFeeds();
      await fetchEvents(true);

      const label = ACTION_LABELS[action] || action;
      const personShow = body.person ? ' (' + body.person + ')' : '';
      showToast('success', '[' + CAMERAS[cameraId].label + '] ' + label + personShow);

      return true;
    } catch (err) {
      showToast('error', '模拟失败: ' + err.message);
      return false;
    }
  }

  /* ── Toast system ── */
  function showToast(type, message) {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = message;
    toastContainer.appendChild(el);
    setTimeout(() => {
      el.classList.add('toast-out');
      setTimeout(() => el.remove(), 300);
    }, 3000);
  }

  /* ── Fetch events ── */
  async function fetchEvents(suppressEmpty) {
    try {
      const res = await fetch(API_BASE + '/api/events?limit=50');
      if (!res.ok) return;
      const data = await res.json();
      renderEvents(data);
    } catch (_) {
      if (!suppressEmpty) showToast('error', '获取事件失败');
    }
  }

  function renderEvents(events) {
    if (!events || !Array.isArray(events) || events.length === 0) {
      if (!eventList.querySelector('.event-empty')) {
        eventList.innerHTML = '<div class="event-empty"><span>等待事件数据...</span></div>';
      }
      eventCount.textContent = '0';
      return;
    }

    const frag = document.createDocumentFragment();
    const maxShow = 50;
    const slice = events.slice(0, maxShow);

    slice.forEach((ev, i) => {
      const item = document.createElement('div');
      item.className = 'event-item' + (i === 0 ? ' new-item' : '');
      const badgeClass = ACTION_BADGE_CLASS[ev.event_type] || 'idle';

      const time = ev.time || '--:--:--';
      const camLabel = CAMERAS[ev.camera_id] ? CAMERAS[ev.camera_id].label : (ev.camera_id || '--');
      const eventDisplay = ACTION_LABELS[ev.event_type] || ev.event_type || '--';
      const detail = ev.detail || '';

      item.innerHTML =
        '<span class="ev-time">' + time + '</span>' +
        '<span class="ev-badge ' + badgeClass + '">' + eventDisplay + '</span>' +
        '<span class="ev-detail">' + escapeHtml(detail) + '</span>' +
        '<span class="ev-cam">' + escapeHtml(camLabel) + '</span>';
      frag.appendChild(item);
    });

    eventList.innerHTML = '';
    eventList.appendChild(frag);
    eventList.scrollTop = 0;
    eventCount.textContent = slice.length;
  }

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ── Health check ── */
  async function fetchHealth() {
    try {
      const res = await fetch(API_BASE + '/api/health');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const kafkaOk = data.kafka === true;
      const cls = kafkaOk ? 'green' : 'red';
      const txt = kafkaOk ? 'Kafka 已连接' : 'Kafka 断开';

      sbKafkaDot.className = 'sb-dot ' + cls;
      sbKafkaText.textContent = txt;
      hdrKafkaDot.className = 'dot ' + cls;
      hdrKafkaText.textContent = txt;

      if (data.uptime_sec != null) {
        const uptime = formatUptime(data.uptime_sec);
        sbUptime.textContent = '服务器运行: ' + uptime;
        hdrUptime.textContent = '运行时间: ' + uptime;
      }

      // Update webcam status
      if (data.webcams) {
        webcamStatus = data.webcams;
        updateWebcamButtons();
      }

      // Store config reference from health
      if (data.config) {
        currentConfig = data.config;
      }
    } catch (_) {
      sbKafkaDot.className = 'sb-dot red';
      sbKafkaText.textContent = 'Kafka 连接失败';
      hdrKafkaDot.className = 'dot red';
      hdrKafkaText.textContent = 'Kafka 连接失败';
    }
  }

  function formatUptime(sec) {
    if (sec < 60) return sec + '秒';
    if (sec < 3600) return Math.floor(sec / 60) + '分 ' + (sec % 60) + '秒';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return h + '时 ' + m + '分';
  }

  /* ── Random mode ── */
  function startRandomMode() {
    if (randomTimer) return;
    randomMode = true;
    randomTrack.classList.add('active');
    randomLabel.textContent = '\u23F9 停止';

    function tick() {
      if (!randomMode) return;
      const camIds = Object.keys(CAMERAS);
      const cam = camIds[Math.floor(Math.random() * camIds.length)];
      const actions = ['entry', 'exit', 'idle'];
      const action = actions[Math.floor(Math.random() * actions.length)];
      const person = action !== 'idle' ? PEOPLE[Math.floor(Math.random() * PEOPLE.length)] : null;

      simulateEvent(cam, action, person).then(() => {
        if (randomMode) {
          const delay = 2000 + Math.random() * 2000;
          randomTimer = setTimeout(tick, delay);
        }
      }).catch(() => {
        if (randomMode) {
          const delay = 2000 + Math.random() * 2000;
          randomTimer = setTimeout(tick, delay);
        }
      });
    }

    const initialDelay = 500 + Math.random() * 500;
    randomTimer = setTimeout(tick, initialDelay);
  }

  function stopRandomMode() {
    randomMode = false;
    if (randomTimer) {
      clearTimeout(randomTimer);
      randomTimer = null;
    }
    randomTrack.classList.remove('active');
    randomLabel.textContent = '\uD83C\uDFB2 随机模拟';
  }

  function toggleRandomMode() {
    if (randomMode) {
      stopRandomMode();
    } else {
      startRandomMode();
    }
  }

  /* ── Generate traffic burst ── */
  async function generateTraffic() {
    genTrafficBtn.disabled = true;
    genTrafficBtn.textContent = '\u23F3 生成中...';

    const camIds = Object.keys(CAMERAS);
    const actions = ['entry', 'exit', 'idle'];
    const count = 8 + Math.floor(Math.random() * 5);

    for (let i = 0; i < count; i++) {
      const cam = camIds[Math.floor(Math.random() * camIds.length)];
      const action = actions[Math.floor(Math.random() * actions.length)];
      const person = action !== 'idle' ? PEOPLE[Math.floor(Math.random() * PEOPLE.length)] : null;
      await simulateEvent(cam, action, person);
      await new Promise(r => setTimeout(r, 200 + Math.random() * 300));
    }

    genTrafficBtn.disabled = false;
    genTrafficBtn.textContent = '\u26A1 生成流量';
  }

  /* ── Settings Drawer ── */
  function openDrawer() {
    settingsDrawer.classList.add('open');
    drawerOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    settingsDrawer.classList.remove('open');
    drawerOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Build config form ── */
  function buildConfigForm(config) {
    currentConfig = config;
    cfgLoading.style.display = 'none';
    cfgContent.style.display = 'block';

    let html = '';
    CONFIG_SECTIONS.forEach(section => {
      html += '<div class="cfg-section">';
      html += '<div class="cfg-section-header" data-target="' + section.id + '-body">';
      html += '<span>' + section.title + '</span>';
      html += '<span class="chevron">\u25BC</span>';
      html += '</div>';
      html += '<div class="cfg-section-body" id="' + section.id + '-body">';

      section.fields.forEach(field => {
        const val = config[field.key] !== undefined ? config[field.key] : '';
        if (field.type === 'slider') {
          html += '<div class="cfg-row">';
          html += '<span class="cfg-label">' + field.label + ' <span class="cfg-unit">(' + field.unit + ')</span></span>';
          html += '<input type="range" id="cfg-' + field.key + '" data-key="' + field.key + '" min="' + field.min + '" max="' + field.max + '" step="' + field.step + '" value="' + val + '">';
          html += '<span class="cfg-value" id="cfg-val-' + field.key + '">' + formatSliderValue(val, field.step) + '</span>';
          html += '</div>';
        } else if (field.type === 'select') {
          const optLabels = field.optionLabels || field.options;
          html += '<div class="cfg-row">';
          html += '<span class="cfg-label">' + field.label + ' <span class="cfg-unit">(' + field.unit + ')</span></span>';
          html += '<select id="cfg-' + field.key + '" data-key="' + field.key + '">';
          field.options.forEach((opt, i) => {
            const display = optLabels[i] !== undefined ? optLabels[i] : opt;
            const selected = String(opt) === String(val) ? ' selected' : '';
            html += '<option value="' + opt + '"' + selected + '>' + display + '</option>';
          });
          html += '</select>';
          if (field.key === 'frame_width') {
            const h = computeHeight(parseInt(val) || 640);
            html += '<span class="cfg-value" id="cfg-val-frame_height">' + h + '</span>';
          }
          html += '</div>';
        } else if (field.type === 'display') {
          const h = computeHeight(parseInt(config.frame_width) || 640);
          html += '<div class="cfg-row">';
          html += '<span class="cfg-label">' + field.label + ' <span class="cfg-unit">(' + field.unit + ')</span></span>';
          html += '<span class="cfg-value" id="cfg-val-frame_height">' + h + '</span>';
          html += '</div>';
        } else if (field.type === 'number') {
          html += '<div class="cfg-row">';
          html += '<span class="cfg-label">' + field.label + ' <span class="cfg-unit">(' + field.unit + ')</span></span>';
          html += '<input type="number" id="cfg-' + field.key + '" data-key="' + field.key + '" min="' + (field.min || 0) + '" max="' + (field.max || 999999) + '" value="' + val + '">';
          html += '</div>';
        } else if (field.type === 'toggle') {
          const active = val === true ? ' active' : '';
          html += '<div class="cfg-toggle-row">';
          html += '<span class="cfg-label">' + field.label + '</span>';
          html += '<div class="cfg-toggle-track' + active + '" id="cfg-' + field.key + '" data-key="' + field.key + '" data-value="' + (val ? 'true' : 'false') + '">';
          html += '<div class="cfg-toggle-thumb"></div>';
          html += '</div>';
          html += '</div>';
        }
      });

      html += '</div></div>';
    });

    // People management section
    html += '<div class="cfg-section"><div class="cfg-section-header" data-target="sec-people-body">';
    html += '<span>&#128101; 人员管理</span><span class="chevron">\u25BC</span>';
    html += '</div><div class="cfg-section-body" id="sec-people-body">';
    html += '<div class="people-input-row">';
    html += '<input type="text" id="people-input" placeholder="输入姓名 (学号)">';
    html += '<button id="people-add-btn">+ 添加</button>';
    html += '</div>';
    html += '<div class="people-list" id="people-list"></div>';
    html += '</div></div>';

    cfgContent.innerHTML = html;

    // Bind slider events
    CONFIG_SECTIONS.forEach(section => {
      section.fields.forEach(field => {
        if (field.type === 'slider') {
          const slider = document.getElementById('cfg-' + field.key);
          if (slider) {
            slider.addEventListener('input', function() {
              const valEl = document.getElementById('cfg-val-' + field.key);
              if (valEl) valEl.textContent = formatSliderValue(parseFloat(this.value), field.step);
            });
          }
        }
        if (field.type === 'select' && field.key === 'frame_width') {
          const sel = document.getElementById('cfg-frame_width');
          if (sel) {
            sel.addEventListener('change', function() {
              const h = computeHeight(parseInt(this.value) || 640);
              const hEl = document.getElementById('cfg-val-frame_height');
              if (hEl) hEl.textContent = h;
            });
          }
        }
      });
    });

    // Bind toggle events
    document.querySelectorAll('.cfg-toggle-track').forEach(el => {
      el.addEventListener('click', function() {
        const current = this.dataset.value === 'true';
        const newVal = !current;
        this.dataset.value = newVal ? 'true' : 'false';
        this.classList.toggle('active', newVal);
      });
    });

    // Bind section collapse
    document.querySelectorAll('.cfg-section-header').forEach(el => {
      el.addEventListener('click', function() {
        this.classList.toggle('collapsed');
        const targetId = this.dataset.target;
        const body = document.getElementById(targetId);
        if (body) {
          body.classList.toggle('hidden');
        }
      });
    });

    // Bind people add
    const peopleInput = document.getElementById('people-input');
    const peopleAddBtn = document.getElementById('people-add-btn');
    if (peopleAddBtn) {
      peopleAddBtn.addEventListener('click', function() {
        const name = peopleInput.value.trim();
        if (name) {
          addPerson(name);
          peopleInput.value = '';
        }
      });
      peopleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const name = this.value.trim();
          if (name) {
            addPerson(name);
            this.value = '';
          }
        }
      });
    }

    // Render people list
    renderPeopleList();
  }

  function formatSliderValue(val, step) {
    if (step >= 1) return String(Math.round(val));
    return String(parseFloat(val).toFixed(2));
  }

  /* ── Render people list ── */
  function renderPeopleList() {
    const list = document.getElementById('people-list');
    if (!list) return;
    if (!PEOPLE || PEOPLE.length === 0) {
      list.innerHTML = '<div class="people-empty">暂无人员</div>';
      return;
    }
    list.innerHTML = '';
    PEOPLE.forEach(name => {
      const item = document.createElement('div');
      item.className = 'people-item';
      item.innerHTML = '<span class="people-name">' + escapeHtml(name) + '</span>' +
        '<button class="people-remove" data-name="' + escapeHtml(name) + '">\u2715</button>';
      item.querySelector('.people-remove').addEventListener('click', function() {
        removePerson(this.dataset.name);
      });
      list.appendChild(item);
    });
  }

  /* ── Collect form values ── */
  function collectConfig() {
    const result = {};
    CONFIG_SECTIONS.forEach(section => {
      section.fields.forEach(field => {
        if (field.type === 'display') return;
        const el = document.getElementById('cfg-' + field.key);
        if (!el) return;
        if (field.type === 'slider') {
          result[field.key] = parseFloat(el.value);
        } else if (field.type === 'select') {
          const val = el.value;
          result[field.key] = Number.isNaN(Number(val)) ? val : Number(val);
        } else if (field.type === 'number') {
          result[field.key] = parseFloat(el.value) || 0;
        } else if (field.type === 'toggle') {
          result[field.key] = el.dataset.value === 'true';
        }
      });
    });
    return result;
  }

  /* ── Save config ── */
  async function saveConfig() {
    const config = collectConfig();
    saveConfigBtn.disabled = true;
    saveConfigBtn.textContent = '\u23F3 保存中...';
    try {
      const res = await fetch(API_BASE + '/api/config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.config) currentConfig = data.config;
      showToast('success', '配置已保存');
    } catch (err) {
      showToast('error', '保存失败: ' + err.message);
    } finally {
      saveConfigBtn.disabled = false;
      saveConfigBtn.textContent = '\uD83D\uDCBE 保存配置';
    }
  }

  /* ── Reset config ── */
  async function resetConfig() {
    resetConfigBtn.disabled = true;
    resetConfigBtn.textContent = '\u23F3 重置中...';
    try {
      const res = await fetch(API_BASE + '/api/config/reset', {
        method: 'PUT',
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.config) {
        buildConfigForm(data.config);
      }
      showToast('success', '配置已恢复默认');
    } catch (err) {
      showToast('error', '重置失败: ' + err.message);
    } finally {
      resetConfigBtn.disabled = false;
      resetConfigBtn.textContent = '\u21BA 恢复默认';
    }
  }

  /* ── Webcam controls ── */
  async function toggleWebcam(cameraId) {
    const active = webcamStatus[cameraId] === true;
    const action = active ? 'stop' : 'start';
    const btn = document.getElementById('wc-' + cameraId);
    if (btn) btn.style.opacity = '0.5';

    try {
      const body = { camera_id: cameraId, action: action };
      if (action === 'start' && currentConfig && currentConfig.webcam_device !== undefined) {
        body.device_index = currentConfig.webcam_device;
      }
      const res = await fetch(API_BASE + '/api/webcam/' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      // Update webcam status based on response
      if (data.status && data.status.active_captures) {
        webcamStatus[cameraId] = action === 'start';
      } else {
        webcamStatus[cameraId] = action === 'start';
      }
      showToast('success', '[' + CAMERAS[cameraId].label + '] Webcam ' + (action === 'start' ? '已启动' : '已停止'));
    } catch (err) {
      showToast('error', 'Webcam操作失败: ' + err.message);
    } finally {
      if (btn) btn.style.opacity = '1';
      updateWebcamButtons();
    }
  }

  /* ── People management ── */
  async function fetchPeople() {
    try {
      const res = await fetch(API_BASE + '/api/people');
      if (!res.ok) return;
      const data = await res.json();
      if (data.people && Array.isArray(data.people)) {
        PEOPLE = data.people;
        renderPeopleList();
      }
    } catch (_) {
      // Use local PEOPLE as fallback
    }
  }

  async function addPerson(name) {
    try {
      const res = await fetch(API_BASE + '/api/people', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.people && Array.isArray(data.people)) {
        PEOPLE = data.people;
        renderPeopleList();
      }
      showToast('success', '已添加: ' + name);
    } catch (err) {
      showToast('error', '添加失败: ' + err.message);
    }
  }

  async function removePerson(name) {
    try {
      const res = await fetch(API_BASE + '/api/people?name=' + encodeURIComponent(name), {
        method: 'DELETE',
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.people && Array.isArray(data.people)) {
        PEOPLE = data.people;
        renderPeopleList();
      }
      showToast('success', '已移除: ' + name);
    } catch (err) {
      showToast('error', '移除失败: ' + err.message);
    }
  }

  /* ── Fetch config from API ── */
  async function fetchConfig() {
    try {
      const res = await fetch(API_BASE + '/api/config');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const config = data.config || data;
      buildConfigForm(config);
    } catch (err) {
      cfgLoading.innerHTML = '加载配置失败: ' + escapeHtml(err.message);
      showToast('error', '加载配置失败');
    }
  }

  /* ── Initialize ── */
  function init() {
    buildGrid();
    updateTimestamps();

    // Initial data fetch
    fetchHealth();
    fetchEvents();

    // Periodic timers
    setInterval(fetchHealth, 10000);
    setInterval(() => fetchEvents(true), 3000);

    // Feed refresh every 2s
    Object.keys(CAMERAS).forEach(id => {
      feedTimers[id] = setInterval(() => {
        const img = document.getElementById('img-' + id);
        if (img) {
          img.classList.add('loading');
          img.src = API_BASE + '/api/cameras/' + id + '/frame.jpg?t=' + Date.now();
        }
      }, 2000);
    });

    // Timestamp update every second
    setInterval(updateTimestamps, 1000);

    // Random mode toggle
    randomToggle.addEventListener('click', toggleRandomMode);

    // Generate traffic button
    genTrafficBtn.addEventListener('click', generateTraffic);

    // Fix feed refresh timestamps every 2s (reuse same interval)
    setInterval(function() { /* feeds handled above */ }, 2000);

    // Settings drawer
    settingsToggle.addEventListener('click', openDrawer);
    drawerClose.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    // Save / Reset config
    saveConfigBtn.addEventListener('click', saveConfig);
    resetConfigBtn.addEventListener('click', resetConfig);

    // Load config into drawer (done once)
    fetchConfig();
    fetchPeople();
  }

  // Start when DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
