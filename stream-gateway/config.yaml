# Cameras are now managed via DB registration + Management API (port 8081).
# Static entries removed — the gateway polls the DB for registered cameras.
# See: stream-gateway/internal/management/handler.go
#
# CAMERA_ENCRYPTION_KEY env var (32 bytes, AES-256) must be set in production
# for RTSP password encryption. Without it, a hardcoded dev key is used.
# IMPORTANT: dormitory-service-go uses a DIFFERENT dev key — set the same
# CAMERA_ENCRYPTION_KEY in both services for cross-module password portability.
cameras: []
frame:
  fps_day: 5
  fps_night: 1
  jpeg_quality: 80
  width: 1280
  height: 720
  dynamic_extraction: true
  motion_threshold: 0.05

kafka:
  # Override via env KAFKA_BROKERS before starting the binary, or
  # replace "localhost:9092" with the Docker service name in production.
  #   export KAFKA_BROKERS="kafka:9092"
  brokers:
    - "localhost:9092"
  topic: "t_dorm_frame"
  compression: "snappy"
  batch_size: 65536

rtsp:
  reconnect_interval: 5s
  read_timeout: 10s
  max_reconnect_attempts: 0

health:
  port: 8080

management:
  port: 8081
  bind_address: "127.0.0.1"
  management_key: ""

database:
  dsn: "root:root@tcp(localhost:3306)/dormitory"
  driver: "mysql"
  poll_interval: 30s

log:
  level: "info"
