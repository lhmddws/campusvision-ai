# CampusVision AI — 基础架构
# 启动: docker compose up -d
# 停止: docker compose down

version: "3.8"

networks:
  campusvision:
    driver: bridge

services:
  # ==================== Kafka ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    container_name: cv-zookeeper
    networks: [campusvision]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: cv-kafka
    networks: [campusvision]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: ""
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: ""
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_MESSAGE_MAX_BYTES: 5242880 # 5MB (for JPEG frames)
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Kafka 初始化 ====================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cv-kafka-init
    networks: [campusvision]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [
        "/bin/bash",
        "-c",
        "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_frame --partitions 4 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=43200000 --config max.message.bytes=5242880 --config compression.type=producer;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_event --partitions 2 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=604800000 --config max.message.bytes=1048576 --config compression.type=producer;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic t_dorm_alert --partitions 1 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=604800000;
        echo 'Topics created:'; kafka-topics --bootstrap-server kafka:9092 --list;",
      ]

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: cv-redis
    networks: [campusvision]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s

  # ==================== MariaDB ====================
  # 生产环境: dormitory-service 直接连接主后端 192.168.113.114:3306/SIMS_CD250626
  # 本地开发: 以下容器作为独立测试数据库
  mariadb:
    image: mariadb:10.11
    hostname: mariadb
    container_name: cv-mariadb
    networks: [campusvision]
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_dev
      MARIADB_DATABASE: dormitory
      MARIADB_USER: dormitory
      MARIADB_PASSWORD: dormitory_dev
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./infra/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "dormitory", "-pdormitory_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==================== MinIO (face snapshots) ====================
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: cv-minio
    networks: [campusvision]
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s

volumes:
  redis-data:
  mariadb-data:
  minio-data:
