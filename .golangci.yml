# See https://golangci-lint.run/ for documentation
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
